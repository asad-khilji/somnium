<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Somnium</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="logo" href="index.html">Somnium</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-banner">
      <div class="container">
        <h1>Contact</h1>
        <p>Get in touch to request a quote.</p>
      </div>
    </section>

    <section class="section">
      <div class="container contact-layout">
        <div>
          <img class="contact-img" src="https://static.wixstatic.com/media/20401a_4b779197a0ec4947b1a284366a9ea148~mv2.jpg/v1/fill/w_640,h_536,al_c,q_80,enc_avif,quality_auto/20401a_4b779197a0ec4947b1a284366a9ea148~mv2.jpg" alt="Somnium remodeling work" />
        </div>

        <div>
          <h2>Get a Quote</h2>
          <form class="quote-form">
            <input type="text" placeholder="Your Name" required />
            <input type="email" placeholder="Your Email" required />
            <input type="tel" placeholder="Phone Number" />
            <textarea placeholder="Tell us about your project" required></textarea>
            <button type="submit">Submit</button>
          </form>

          <div class="contact-info">
            <p><strong>Thanks for submitting!</strong></p>
            <p><strong>Location:</strong> Mine Hill, NJ</p>
            <p><strong>Email:</strong> <a href="mailto:somnium_home@icloud.com">somnium_home@icloud.com</a></p>
            <p><strong>Phone:</strong> <a href="tel:8622230358">862-223-0358</a></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container footer-wrap">
      <p>&copy; 2026 Somnium Home. All rights reserved.</p>
      <p>Mine Hill, NJ</p>
    </div>
  </footer>
</body>
</html>
